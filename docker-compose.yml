services:
  twitter-indexer:
    build: .
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config
      - cookies:/app/.cookies

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: twitter_indexer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d twitter_indexer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  cookies:
